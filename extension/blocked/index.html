<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusTab — アクセス制限</title>
  <style>
    :root {
      --bg: #1a1f2e;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #3b82f6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .main {
      text-align: center;
      max-width: 560px;
      padding: 2rem;
    }
    h1 { font-size: 1.75rem; margin-bottom: 1rem; }
    .cta {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: var(--accent);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
    .emergency {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      font-size: 0.7rem;
      color: var(--muted);
      text-decoration: none;
    }
    .emergency:hover { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="main">
    <h1>現在は仕事モードです</h1>
    <p>タスクに戻りましょう</p>
    <a class="cta" href="chrome://newtab">タスク一覧へ</a>
  </div>
  <!-- 設計書 3.2: 緊急解除は目立たない位置に小さく配置 -->
  <a class="emergency" href="#">緊急解除（Phase 5 で実装）</a>
</body>
</html>
